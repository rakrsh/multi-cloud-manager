version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - bodyclose
    - gocyclo
    - goconst
    - unconvert
    - unparam
    - misspell
    - prealloc
    - nakedret
    - revive
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
